<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offline - Music App</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #000;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }
    .icon {
      width: 80px;
      height: 80px;
      background: #1db954;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 2rem;
      font-size: 2.5rem;
    }
    h1 {
      font-size: 1.75rem;
      margin-bottom: 0.75rem;
    }
    p {
      color: #b3b3b3;
      font-size: 1rem;
      line-height: 1.5;
      max-width: 400px;
      margin-bottom: 2rem;
    }
    button {
      background: #1db954;
      color: #000;
      border: none;
      padding: 0.875rem 2rem;
      border-radius: 9999px;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
    }
    button:hover {
      background: #1ed760;
    }
  </style>
</head>
<body>
  <div class="icon">🎵</div>
  <h1>You're Offline</h1>
  <p>It looks like your internet connection is down. Some features may be unavailable until you reconnect.</p>
  <button onclick="window.location.reload()">Try Again</button>
</body>
</html>
